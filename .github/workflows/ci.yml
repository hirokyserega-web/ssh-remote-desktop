name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install ruff
      - name: Ruff
        run: ruff check .
      - name: Compile
        run: python -m compileall -q common crypto server client server_gui tests
      - name: Build scripts smoke (bash -n + present)
        run: |
          set -e
          # The Nuitka build scripts (build_*.sh) are referenced by README and
          # install.sh --build; a missing or syntactically-broken one breaks
          # `install.sh --build` and the release flow. Syntax-check each and
          # assert the ones the docs/installer reference actually exist.
          for f in build_*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done
          for expected in build_client_linux.sh build_server_linux.sh build_server_gui_linux.sh; do
            test -f "$expected" || { echo "missing build script: $expected"; exit 1; }
          done

  scripts-lint:
    name: Installer scripts (bash -n + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: bash -n (syntax)
        run: |
          set -e
          for f in scripts/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done
      - name: shellcheck (warnings, non-fatal on info)
        run: |
          # SC1091 (sourcing /etc/os-release) is expected and safe; ignore it.
          shellcheck -x -e SC1091 scripts/*.sh || {
            echo "shellcheck reported issues (see above); treating warnings as errors."
            exit 1
          }

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
      - name: Run actionlint
        run: actionlint

  test-linux:
    name: Tests (Linux, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-6 libxext6 libxtst6 libxfixes3 libxdamage1 \
            libxkbcommon0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            xvfb libegl1
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-linux.txt
          pip install pytest pytest-asyncio pyyaml
          # Qt for client import smoke test
          pip install PySide6
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python -m pytest tests/ -q --color=yes

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio PySide6 pyyaml
      - name: Run tests
        run: python -m pytest tests/ -q --color=yes --ignore=tests/test_broker_loopback.py
